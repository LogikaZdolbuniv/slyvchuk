    <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caffee | Головна</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
      <header class="header">
        <div class="container header__inner">

            <div class="logo">
                <img src="img/cafe.png" alt="Coffee Cafe logo" class="logo__img">
            </div>

         <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Головна</a></li>
                    <li class="nav__item"><a href="menu.html" class="nav__link">Меню</a></li>
                    <li class="nav__item"><a href="booking.html" class="nav__link">Забронювати столик</a></li>
                
                </ul>
            </nav>

        </div>
    </header>
    <main>
    <h2>Забронювати столик </h2>
    
    <form>
        <label for="name">ім'я</label>
        <input type="text" id="name" name="name" required>
        
        <label for="phone">Телефон</label>
     <input type="tell" id="phone" name="phone" required>
        
         <label for="date">Дата</label>
         <input type="date" id="date" name="date" required>
         
          <label for="time">Час</label>
         <input type="time" id="time" name="time" required>
         
          <label for="guests">Кількість гостей</label>
         <select id="guests" name="guests">
         
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>67</option>
        <option>1488</option>
          
          
          
         </select>
         <button type="submit">Забронювати</button>
        
    </form>
    </main>
<footer>

    </div>
</footer>
